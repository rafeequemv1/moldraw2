<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Dashboard | MolDraw</title>
  <link rel="stylesheet" href="/css/site-topbar.css" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #f8fafc;
      color: #0f172a;
      font-family: 'Libre Franklin', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .dashboard-layout {
      width: min(1180px, 94vw);
      margin: 0 auto;
      padding: 28px 0 48px;
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 18px;
    }
    .dashboard-sidebar {
      display: none;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 10px;
      height: fit-content;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.05);
    }
    .dashboard-sidebar.visible { display: block; }
    .dashboard-nav-item {
      display: flex;
      width: 100%;
      align-items: center;
      justify-content: flex-start;
      border: 1px solid transparent;
      border-radius: 10px;
      background: #fff;
      color: #334155;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      margin-bottom: 6px;
    }
    .dashboard-nav-item.active {
      border-color: #2C7A7B;
      background: #2C7A7B;
      color: #fff;
    }
    .dashboard-main {
      min-width: 0;
    }
    .dashboard-card {
      min-height: 360px;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 14px 40px rgba(15, 23, 42, 0.06);
      padding: 24px;
    }
    .dashboard-blank {
      min-height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .dashboard-title {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 44px);
      letter-spacing: -0.04em;
    }
    .dashboard-subtitle {
      margin: 0;
      color: #64748b;
      font-size: 14px;
    }
    .requests-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .requests-head h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -0.03em;
    }
    .requests-status {
      color: #64748b;
      font-size: 12px;
      font-weight: 700;
    }
    .request-list {
      display: grid;
      gap: 8px;
    }
    .request-list-item {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(130px, 0.8fr) 92px 120px;
      align-items: center;
      gap: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fbfdff;
      padding: 12px;
      color: inherit;
      text-align: left;
      cursor: pointer;
      font-family: inherit;
    }
    .request-list-item:hover {
      border-color: #b6d7d8;
      background: #f7fcfc;
    }
    .request-list-title {
      min-width: 0;
      font-size: 14px;
      font-weight: 800;
      color: #0f172a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .request-list-meta {
      color: #64748b;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .request-status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 11px;
      font-weight: 800;
      text-transform: capitalize;
    }
    .request-card {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
      background: #fbfdff;
    }
    .request-card h2 {
      margin: 0 0 6px;
      color: #0f172a;
      font-size: 16px;
    }
    .request-meta {
      margin: 0 0 8px;
      color: #64748b;
      font-size: 12px;
    }
    .request-desc {
      margin: 0;
      color: #334155;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
    }
    .request-images {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .request-images a {
      display: block;
      width: 86px;
      height: 66px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #dbe4ee;
      background: #fff;
    }
    .request-images img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .dashboard-table-wrap {
      overflow-x: auto;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      background: #fff;
    }
    .dashboard-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
    }
    .dashboard-table th,
    .dashboard-table td {
      padding: 10px 12px;
      border-bottom: 1px solid #edf1f5;
      text-align: left;
      font-size: 12px;
      vertical-align: top;
    }
    .dashboard-table th {
      color: #64748b;
      background: #f8fafc;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .dashboard-table tr:last-child td {
      border-bottom: none;
    }
    .role-pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 3px 8px;
      background: #f1f5f9;
      color: #334155;
      font-size: 11px;
      font-weight: 800;
      text-transform: capitalize;
    }
    .role-pill-admin {
      background: #ecfdf5;
      color: #047857;
    }
    .profile-card {
      display: grid;
      gap: 16px;
      max-width: 680px;
    }
    .profile-form {
      display: grid;
      gap: 14px;
    }
    .profile-field {
      display: grid;
      gap: 6px;
      color: #334155;
      font-size: 12px;
      font-weight: 800;
    }
    .profile-field input,
    .profile-field select {
      width: 100%;
      min-height: 38px;
      border: 1px solid #d8e1ea;
      border-radius: 10px;
      background: #fff;
      color: #0f172a;
      font: inherit;
      font-size: 13px;
      padding: 8px 10px;
    }
    .avatar-picker {
      display: grid;
      grid-template-columns: repeat(4, minmax(92px, 1fr));
      gap: 10px;
    }
    .avatar-option {
      display: grid;
      place-items: center;
      gap: 8px;
      border: 1px solid #d8e1ea;
      border-radius: 14px;
      background: #fff;
      padding: 12px 8px;
      cursor: pointer;
      color: #334155;
      font-size: 11px;
      font-weight: 900;
    }
    .avatar-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .avatar-option:has(input:checked) {
      border-color: #2C7A7B;
      background: #eefafa;
      color: #1a5a5b;
    }
    .profile-avatar {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 20px;
      font-weight: 900;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.35);
    }
    .avatar-teal { background: linear-gradient(135deg, #2C7A7B, #67e8f9); }
    .avatar-blue { background: linear-gradient(135deg, #2563eb, #93c5fd); }
    .avatar-purple { background: linear-gradient(135deg, #7c3aed, #c4b5fd); }
    .avatar-amber { background: linear-gradient(135deg, #d97706, #fde68a); color: #7c2d12; }
    .profile-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .profile-notice {
      color: #047857;
      font-size: 12px;
      font-weight: 800;
    }
    .dashboard-modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 5000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(15, 23, 42, 0.46);
    }
    .dashboard-modal-backdrop.visible {
      display: flex;
    }
    .dashboard-modal {
      width: min(720px, 96vw);
      max-height: 90vh;
      overflow: auto;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 22px 64px rgba(15, 23, 42, 0.28);
      border: 1px solid #e5e7eb;
      padding: 20px;
    }
    .dashboard-modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .dashboard-modal-title {
      margin: 0 0 6px;
      font-size: 22px;
      letter-spacing: -0.03em;
    }
    .dashboard-modal-close {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 999px;
      background: #f1f5f9;
      color: #334155;
      font-size: 20px;
      cursor: pointer;
    }
    .modal-desc {
      white-space: pre-wrap;
      color: #334155;
      line-height: 1.6;
      font-size: 14px;
      margin: 12px 0 0;
    }
    .modal-images {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
      margin-top: 16px;
    }
    .modal-images a {
      display: block;
      border: 1px solid #dbe4ee;
      border-radius: 12px;
      overflow: hidden;
      background: #f8fafc;
    }
    .modal-images img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      display: block;
    }
    .local-warning {
      margin: 0 0 18px;
      padding: 12px 14px;
      border: 1px solid #fed7aa;
      border-radius: 14px;
      background: #fff7ed;
      color: #9a3412;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.45;
    }
    .projects-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .projects-head h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -0.03em;
    }
    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 14px;
    }
    .project-card {
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      background: #fbfdff;
      overflow: hidden;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
    }
    .project-preview {
      height: 132px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
    }
    .project-preview img {
      max-width: 94%;
      max-height: 112px;
      display: block;
    }
    .project-preview-empty {
      color: #94a3b8;
      font-size: 12px;
      font-weight: 800;
    }
    .project-body {
      padding: 12px;
    }
    .project-body h2 {
      margin: 0 0 6px;
      color: #0f172a;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .project-meta {
      margin: 0 0 10px;
      color: #64748b;
      font-size: 11px;
      line-height: 1.4;
    }
    .project-actions {
      display: flex;
      gap: 8px;
    }
    .project-action {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 30px;
      border: 1px solid #dbe4ee;
      border-radius: 9px;
      background: #fff;
      color: #334155;
      font-size: 12px;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }
    .project-action-primary {
      border-color: #2C7A7B;
      background: #2C7A7B;
      color: #fff;
    }
    @media (max-width: 760px) {
      .dashboard-layout {
        grid-template-columns: 1fr;
      }
      .request-list-item {
        grid-template-columns: 1fr;
        gap: 5px;
      }
    }
    @media (max-width: 600px) {
      .dashboard-layout {
        width: 100%;
        padding: 12px 10px 36px;
        gap: 10px;
      }
      .dashboard-sidebar.visible {
        display: flex;
        gap: 6px;
        overflow-x: auto;
        padding: 8px;
        border-radius: 14px;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .dashboard-sidebar.visible::-webkit-scrollbar {
        display: none;
      }
      .dashboard-nav-item {
        flex: 0 0 auto;
        margin-bottom: 0;
        min-height: 40px;
        padding: 8px 11px;
        white-space: nowrap;
      }
      .dashboard-card {
        min-height: auto;
        padding: 16px;
        border-radius: 16px;
      }
      .dashboard-title {
        font-size: 28px;
      }
      .requests-head {
        flex-direction: column;
        align-items: flex-start;
      }
      .request-list-title,
      .request-list-meta {
        white-space: normal;
        overflow: visible;
        text-overflow: clip;
      }
      .request-status-pill {
        width: fit-content;
      }
      .profile-card {
        max-width: 100%;
      }
      .avatar-picker {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .project-grid {
        grid-template-columns: 1fr;
      }
      .project-actions {
        grid-template-columns: 1fr;
      }
      .dashboard-modal-backdrop {
        align-items: flex-end;
        padding: 0;
      }
      .dashboard-modal {
        width: 100%;
        max-height: calc(100dvh - 18px);
        border-radius: 18px 18px 0 0;
        padding: 16px;
      }
      .modal-images {
        grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="dashboard-layout">
    <aside id="dashboard-sidebar" class="dashboard-sidebar" aria-label="Dashboard sections">
      <button id="drawings-nav" class="dashboard-nav-item active" type="button">Drawings</button>
      <button id="profile-nav" class="dashboard-nav-item" type="button" hidden>Profile</button>
      <button id="requests-nav" class="dashboard-nav-item" type="button" hidden>Feature requests</button>
      <button id="reports-nav" class="dashboard-nav-item" type="button" hidden>Reports</button>
      <button id="users-nav" class="dashboard-nav-item" type="button" hidden>Users</button>
    </aside>
    <section class="dashboard-main">
      <div id="dashboard-root" class="dashboard-card">
        <div class="dashboard-blank">
          <div>
            <h1 class="dashboard-title">Dashboard</h1>
            <p class="dashboard-subtitle">Loading your MolDraw account...</p>
          </div>
        </div>
      </div>
    </section>
  </main>
  <div id="request-modal-backdrop" class="dashboard-modal-backdrop" aria-hidden="true">
    <div class="dashboard-modal" role="dialog" aria-modal="true" aria-labelledby="request-modal-title">
      <div id="request-modal-root"></div>
    </div>
  </div>
  <div id="confirm-modal-backdrop" class="dashboard-modal-backdrop" aria-hidden="true">
    <div class="dashboard-modal" role="dialog" aria-modal="true" aria-labelledby="confirm-modal-title">
      <div id="confirm-modal-root"></div>
    </div>
  </div>
  <script src="/js/site-topbar.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://wwehouchqznsvnrosaeb.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_lP5X_egPBmD__qqKPjyoyg_M4iNUj_C';
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const root = document.getElementById('dashboard-root');
    const sidebar = document.getElementById('dashboard-sidebar');
    const drawingsNav = document.getElementById('drawings-nav');
    const profileNav = document.getElementById('profile-nav');
    const requestsNav = document.getElementById('requests-nav');
    const reportsNav = document.getElementById('reports-nav');
    const usersNav = document.getElementById('users-nav');
    const requestModalBackdrop = document.getElementById('request-modal-backdrop');
    const requestModalRoot = document.getElementById('request-modal-root');
    const confirmModalBackdrop = document.getElementById('confirm-modal-backdrop');
    const confirmModalRoot = document.getElementById('confirm-modal-root');
    const LOCAL_PROJECTS_STORAGE_KEY = 'moldraw_local_projects';
    let latestFeatureRequests = [];
    let currentUser = null;
    let currentProfile = null;
    const avatarOptions = [
      { key: 'avatar-teal', label: 'Teal' },
      { key: 'avatar-blue', label: 'Blue' },
      { key: 'avatar-purple', label: 'Purple' },
      { key: 'avatar-amber', label: 'Amber' },
    ];
    const designationOptions = ['Student', 'Researcher', 'Scientist', 'Faculty', 'Artist', 'Educator', 'Pharma', 'Other'];
    const requestStatusLabels = {
      new: 'New',
      under_review: 'Under review',
      under_progress: 'Under progress',
      done: 'Done'
    };
    const reportReasonLabels = {
      spam: 'Spam',
      harassment: 'Harassment or abuse',
      unsafe_chemistry: 'Unsafe chemistry',
      illegal_activity: 'Illegal activity',
      medical_advice: 'Medical advice',
      privacy: 'Privacy concern',
      other: 'Other'
    };
    const reportStatusLabels = {
      open: 'Open',
      reviewing: 'Reviewing',
      resolved: 'Resolved',
      dismissed: 'Dismissed'
    };

    const escapeHtml = (value) => String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');

    const readLocalProjects = () => {
      try {
        const parsed = JSON.parse(localStorage.getItem(LOCAL_PROJECTS_STORAGE_KEY) || '[]');
        return Array.isArray(parsed) ? parsed.filter((project) => project && project.id && project.molfile) : [];
      } catch {
        return [];
      }
    };

    const writeLocalProjects = (projects) => {
      localStorage.setItem(LOCAL_PROJECTS_STORAGE_KEY, JSON.stringify(projects));
    };

    function setActiveNav(active) {
      drawingsNav.classList.toggle('active', active === 'drawings');
      profileNav.classList.toggle('active', active === 'profile');
      requestsNav.classList.toggle('active', active === 'requests');
      reportsNav.classList.toggle('active', active === 'reports');
      usersNav.classList.toggle('active', active === 'users');
    }

    function renderBlank(message) {
      sidebar.classList.toggle('visible', Boolean(currentUser));
      setActiveNav('drawings');
      root.innerHTML = `
        <div class="dashboard-blank">
          <div>
            <h1 class="dashboard-title">Dashboard</h1>
            <p class="dashboard-subtitle">${escapeHtml(message)}</p>
            ${currentUser ? '' : `<p style="margin-top:16px;">
              <a class="project-action project-action-primary" href="/?signin=1" style="display:inline-flex;padding:0 18px;">Sign in to MolDraw</a>
            </p>`}
          </div>
        </div>
      `;
    }

    function renderProjects() {
      sidebar.classList.add('visible');
      setActiveNav('drawings');
      const projects = readLocalProjects();
      const cards = projects.length ? projects.map((project) => {
        const svg = String(project.svg || '');
        const preview = svg
          ? `<img src="data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}" alt="${escapeHtml(project.title || 'MolDraw drawing')} preview">`
          : '<span class="project-preview-empty">No preview</span>';
        const updatedAt = project.updatedAt || project.createdAt;
        return `
          <article class="project-card">
            <div class="project-preview">${preview}</div>
            <div class="project-body">
              <h2 title="${escapeHtml(project.title || 'Untitled drawing')}">${escapeHtml(project.title || 'Untitled drawing')}</h2>
              <p class="project-meta">
                ${escapeHtml(project.smiles || 'No SMILES saved')}<br>
                ${updatedAt ? escapeHtml(new Date(updatedAt).toLocaleString()) : 'Saved locally'}
              </p>
              <div class="project-actions">
                <a class="project-action project-action-primary" href="/?project=${encodeURIComponent(project.id)}">Open</a>
                <button class="project-action" type="button" data-delete-project="${escapeHtml(project.id)}">Delete</button>
              </div>
            </div>
          </article>
        `;
      }).join('') : `
        <div class="dashboard-blank">
          <div>
            <h1 class="dashboard-title">No local drawings yet</h1>
            <p class="dashboard-subtitle">Open MolDraw, draw a molecule, then use New design to save it as a local project card.</p>
          </div>
        </div>
      `;

      root.innerHTML = `
        <p class="local-warning">
          Projects are saved locally in this browser. They can be lost if browser data is cleared, you use private mode, or you switch devices. Cloud saving is coming soon.
        </p>
        <div class="projects-head">
          <h1>Drawings</h1>
          <span class="requests-status">${projects.length} local</span>
        </div>
        <div class="project-grid">${cards}</div>
      `;

      root.querySelectorAll('[data-delete-project]').forEach((button) => {
        button.addEventListener('click', () => {
          const id = button.getAttribute('data-delete-project');
          const project = readLocalProjects().find((item) => item.id === id);
          openDeleteProjectModal(project);
        });
      });
    }

    function closeConfirmModal() {
      confirmModalBackdrop.classList.remove('visible');
      confirmModalBackdrop.setAttribute('aria-hidden', 'true');
      confirmModalRoot.innerHTML = '';
    }

    function openDeleteProjectModal(project) {
      if (!project) return;
      confirmModalRoot.innerHTML = `
        <div class="dashboard-modal-head">
          <div>
            <h1 id="confirm-modal-title" class="dashboard-modal-title">Delete drawing?</h1>
            <p class="request-meta">This local project will be removed from this browser.</p>
          </div>
          <button class="dashboard-modal-close" type="button" aria-label="Close delete confirmation">×</button>
        </div>
        <p class="modal-desc">Delete <strong>${escapeHtml(project.title || 'Untitled drawing')}</strong>? This cannot be undone.</p>
        <div class="project-actions" style="margin-top:18px;">
          <button id="confirm-delete-cancel" class="project-action" type="button">Cancel</button>
          <button id="confirm-delete-action" class="project-action" type="button" style="border-color:#dc2626;background:#dc2626;color:#fff;">Delete</button>
        </div>
      `;
      confirmModalBackdrop.classList.add('visible');
      confirmModalBackdrop.setAttribute('aria-hidden', 'false');
      confirmModalRoot.querySelector('.dashboard-modal-close').addEventListener('click', closeConfirmModal);
      confirmModalRoot.querySelector('#confirm-delete-cancel').addEventListener('click', closeConfirmModal);
      confirmModalRoot.querySelector('#confirm-delete-action').addEventListener('click', () => {
        writeLocalProjects(readLocalProjects().filter((item) => item.id !== project.id));
        closeConfirmModal();
        renderProjects();
      });
    }

    const safeAvatarKey = (key) => avatarOptions.some((option) => option.key === key) ? key : 'avatar-teal';
    const initials = (name) => String(name || 'M').trim().slice(0, 1).toUpperCase() || 'M';

    function renderProfile(profile) {
      sidebar.classList.add('visible');
      setActiveNav('profile');
      const avatarKey = safeAvatarKey(profile?.avatar_key);
      const isAdmin = Boolean(profile?.is_admin || profile?.role === 'admin');
      root.innerHTML = `
        <div class="requests-head">
          <div>
            <h1>Profile</h1>
            <p class="dashboard-subtitle">Update your MolDraw community identity.</p>
          </div>
          <span class="role-pill${isAdmin ? ' role-pill-admin' : ''}">${isAdmin ? 'Admin' : 'User'}</span>
        </div>
        <div class="profile-card">
          <form id="profile-form" class="profile-form">
            <label class="profile-field">
              Name
              <input id="profile-name" type="text" value="${escapeHtml(profile?.name || '')}" maxlength="120" required>
            </label>
            <label class="profile-field">
              Email
              <input type="email" value="${escapeHtml(profile?.email || currentUser?.email || '')}" disabled>
            </label>
            <label class="profile-field">
              Designation
              <select id="profile-designation">
                ${designationOptions.map((option) => `<option value="${escapeHtml(option)}"${String(profile?.designation || '').toLowerCase() === option.toLowerCase() ? ' selected' : ''}>${escapeHtml(option)}</option>`).join('')}
              </select>
            </label>
            <div class="profile-field">
              Avatar picture
              <div class="avatar-picker">
                ${avatarOptions.map((option) => `
                  <label class="avatar-option">
                    <input type="radio" name="avatar_key" value="${escapeHtml(option.key)}"${avatarKey === option.key ? ' checked' : ''}>
                    <span class="profile-avatar ${escapeHtml(option.key)}">${escapeHtml(initials(profile?.name || currentUser?.email))}</span>
                    ${escapeHtml(option.label)}
                  </label>
                `).join('')}
              </div>
            </div>
            <div class="profile-actions">
              <button class="project-action project-action-primary" type="submit" style="flex:0 0 auto;padding:0 16px;">Save profile</button>
              <span id="profile-notice" class="profile-notice"></span>
            </div>
          </form>
        </div>
      `;

      root.querySelector('#profile-form').addEventListener('submit', saveProfile);
    }

    async function loadProfile() {
      if (!currentUser) {
        renderBlank('Sign in to edit your profile.');
        return;
      }
      root.innerHTML = '<p class="dashboard-subtitle">Loading profile...</p>';
      const { data: profile, error } = await client
        .from('users')
        .select('id,name,email,designation,avatar_key,is_admin,role')
        .eq('id', currentUser.id)
        .maybeSingle();

      if (error) {
        renderBlank(error.message || 'Could not load profile.');
        return;
      }

      currentProfile = profile || {
        id: currentUser.id,
        name: currentUser.user_metadata?.name || currentUser.email,
        email: currentUser.email,
        designation: 'Other',
        avatar_key: 'avatar-teal',
        role: 'user',
        is_admin: false
      };
      renderProfile(currentProfile);
    }

    async function saveProfile(event) {
      event.preventDefault();
      if (!currentUser) return;
      const notice = root.querySelector('#profile-notice');
      const name = root.querySelector('#profile-name').value.trim();
      const designation = root.querySelector('#profile-designation').value;
      const avatarKey = root.querySelector('input[name="avatar_key"]:checked')?.value || 'avatar-teal';
      if (!name) {
        notice.textContent = 'Add your name.';
        return;
      }
      notice.textContent = 'Saving...';
      let { data, error } = await client
        .from('users')
        .update({ name, designation, avatar_key: safeAvatarKey(avatarKey) })
        .eq('id', currentUser.id)
        .select('id,name,email,designation,avatar_key,is_admin,role')
        .maybeSingle();

      if (!error && !data) {
        const insertResult = await client
          .from('users')
          .insert({
            id: currentUser.id,
            name,
            email: currentUser.email,
            designation,
            avatar_key: safeAvatarKey(avatarKey)
          })
          .select('id,name,email,designation,avatar_key,is_admin,role')
          .maybeSingle();
        data = insertResult.data;
        error = insertResult.error;
      }

      if (error) {
        notice.textContent = error.message || 'Could not save profile.';
        return;
      }

      currentProfile = data;
      notice.textContent = 'Profile updated.';
      renderProfile(currentProfile);
      const updatedNotice = root.querySelector('#profile-notice');
      if (updatedNotice) updatedNotice.textContent = 'Profile updated.';
    }

    function renderRequests(requests) {
      sidebar.classList.add('visible');
      setActiveNav('requests');
      latestFeatureRequests = requests;
      const rows = requests.length ? requests.map((request) => {
        const images = Array.isArray(request.image_urls) ? request.image_urls : [];
        return `
          <button class="request-list-item" type="button" data-request-id="${escapeHtml(request.id)}">
            <span class="request-list-title">${escapeHtml(request.title)}</span>
            <span class="request-list-meta">${escapeHtml(request.name)} · ${escapeHtml(request.email)}</span>
            <span class="request-status-pill">${escapeHtml(requestStatusLabels[request.status] || request.status || 'New')}</span>
            <span class="request-list-meta">${images.length} image${images.length === 1 ? '' : 's'}</span>
          </button>
        `;
      }).join('') : '<p class="dashboard-subtitle">No feature requests yet.</p>';

      root.innerHTML = `
        <div class="requests-head">
          <h1>Feature requests</h1>
          <span class="requests-status">${requests.length} total</span>
        </div>
        <div class="request-list">${rows}</div>
      `;

      root.querySelectorAll('[data-request-id]').forEach((button) => {
        button.addEventListener('click', () => {
          const request = latestFeatureRequests.find((item) => item.id === button.getAttribute('data-request-id'));
          if (request) openRequestModal(request);
        });
      });
    }

    function closeRequestModal() {
      requestModalBackdrop.classList.remove('visible');
      requestModalBackdrop.setAttribute('aria-hidden', 'true');
      requestModalRoot.innerHTML = '';
    }

    async function updateRequestStatus(requestId, status) {
      const { error } = await client
        .from('feature_requests')
        .update({ status })
        .eq('id', requestId);

      if (error) {
        alert(error.message || 'Could not update request status.');
        return;
      }

      const request = latestFeatureRequests.find((item) => item.id === requestId);
      if (request) request.status = status;
      closeRequestModal();
      renderRequests(latestFeatureRequests);
    }

    function openRequestModal(request) {
      const images = Array.isArray(request.image_urls) ? request.image_urls : [];
      const currentStatus = request.status || 'new';
      requestModalRoot.innerHTML = `
        <div class="dashboard-modal-head">
          <div>
            <h1 id="request-modal-title" class="dashboard-modal-title">${escapeHtml(request.title)}</h1>
            <p class="request-meta">
              ${escapeHtml(request.name)} · ${escapeHtml(request.email)} · ${escapeHtml(new Date(request.created_at).toLocaleString())}
            </p>
            <label class="profile-field" style="max-width:220px;margin-top:10px;">
              Admin status
              <select id="request-status-select">
                ${Object.keys(requestStatusLabels).map((key) => `<option value="${key}"${key === currentStatus ? ' selected' : ''}>${requestStatusLabels[key]}</option>`).join('')}
              </select>
            </label>
          </div>
          <button class="dashboard-modal-close" type="button" aria-label="Close feature request">×</button>
        </div>
        <p class="modal-desc">${escapeHtml(request.description)}</p>
        ${images.length ? `
          <div class="modal-images">
            ${images.map((url) => `
              <a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">
                <img src="${escapeHtml(url)}" alt="Feature request attachment" loading="lazy">
              </a>
            `).join('')}
          </div>
        ` : '<p class="dashboard-subtitle" style="margin-top:16px;">No images attached.</p>'}
      `;
      requestModalBackdrop.classList.add('visible');
      requestModalBackdrop.setAttribute('aria-hidden', 'false');
      requestModalRoot.querySelector('.dashboard-modal-close').addEventListener('click', closeRequestModal);
      requestModalRoot.querySelector('#request-status-select').addEventListener('change', (event) => updateRequestStatus(request.id, event.target.value));
    }

    async function loadFeatureRequests() {
      root.innerHTML = '<p class="dashboard-subtitle">Loading feature requests...</p>';
      const { data: requests, error: requestError } = await client
        .from('feature_requests')
        .select('id,name,email,title,description,image_urls,status,created_at')
        .order('created_at', { ascending: false });

      if (requestError) {
        renderBlank(requestError.message || 'Could not load feature requests.');
        return;
      }

      renderRequests(requests || []);
    }

    function renderUsers(users) {
      sidebar.classList.add('visible');
      setActiveNav('users');
      const rows = users.length ? users.map((user) => `
        <tr>
          <td><span class="profile-avatar ${escapeHtml(safeAvatarKey(user.avatar_key))}" style="width:30px;height:30px;font-size:12px;margin-right:8px;vertical-align:middle;">${escapeHtml(initials(user.name || user.email))}</span>${escapeHtml(user.name || 'Unnamed')}</td>
          <td>${escapeHtml(user.email || '')}</td>
          <td>${escapeHtml(user.designation || '')}</td>
          <td><span class="role-pill${user.is_admin || user.role === 'admin' ? ' role-pill-admin' : ''}">${escapeHtml(user.role || (user.is_admin ? 'admin' : 'user'))}</span></td>
          <td>${user.created_at ? escapeHtml(new Date(user.created_at).toLocaleString()) : ''}</td>
        </tr>
      `).join('') : '<tr><td colspan="5">No users found.</td></tr>';

      root.innerHTML = `
        <div class="requests-head">
          <h1>Users</h1>
          <span class="requests-status">${users.length} total</span>
        </div>
        <div class="dashboard-table-wrap">
          <table class="dashboard-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Designation</th>
                <th>Role</th>
                <th>Created</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
    }

    async function loadUsers() {
      root.innerHTML = '<p class="dashboard-subtitle">Loading users...</p>';
      const { data: users, error: usersError } = await client
        .from('users')
        .select('id,name,email,designation,avatar_key,is_admin,role,created_at,updated_at')
        .order('created_at', { ascending: false });

      if (usersError) {
        renderBlank(usersError.message || 'Could not load users.');
        return;
      }

      renderUsers(users || []);
    }

    function renderReports(reports) {
      sidebar.classList.add('visible');
      setActiveNav('reports');
      const rows = reports.length ? reports.map((report) => `
        <article class="request-card" style="display:grid;gap:10px;">
          <div class="requests-head" style="margin:0;">
            <div>
              <h2>${escapeHtml(reportReasonLabels[report.reason] || report.reason || 'Report')}</h2>
              <p class="request-meta">
                ${escapeHtml(report.target_type || 'item')} · ${escapeHtml(report.target_id || '')}<br>
                Reported ${report.created_at ? escapeHtml(new Date(report.created_at).toLocaleString()) : ''}
              </p>
            </div>
            <label class="profile-field" style="max-width:180px;">
              Status
              <select data-report-status="${escapeHtml(report.id)}">
                ${Object.keys(reportStatusLabels).map((key) => `<option value="${key}"${key === report.status ? ' selected' : ''}>${reportStatusLabels[key]}</option>`).join('')}
              </select>
            </label>
          </div>
          ${report.details ? `<p class="request-desc">${escapeHtml(report.details)}</p>` : '<p class="dashboard-subtitle">No extra details.</p>'}
          <p class="request-meta">Reporter: ${escapeHtml(report.reporter_user_id || '')}</p>
        </article>
      `).join('') : '<p class="dashboard-subtitle">No community reports yet.</p>';

      root.innerHTML = `
        <div class="requests-head">
          <h1>Community reports</h1>
          <span class="requests-status">${reports.length} total</span>
        </div>
        <div class="request-list">${rows}</div>
      `;

      root.querySelectorAll('[data-report-status]').forEach((select) => {
        select.addEventListener('change', () => updateReportStatus(select.getAttribute('data-report-status'), select.value));
      });
    }

    async function updateReportStatus(reportId, status) {
      const { error } = await client
        .from('community_reports')
        .update({
          status,
          reviewed_by: currentUser.id,
          reviewed_at: new Date().toISOString()
        })
        .eq('id', reportId);

      if (error) {
        alert(error.message || 'Could not update report status.');
        return;
      }

      await loadReports();
    }

    async function loadReports() {
      root.innerHTML = '<p class="dashboard-subtitle">Loading community reports...</p>';
      const { data: reports, error: reportsError } = await client
        .from('community_reports')
        .select('id,reporter_user_id,target_type,target_id,reason,details,status,created_at')
        .order('created_at', { ascending: false })
        .limit(100);

      if (reportsError) {
        renderBlank(reportsError.message || 'Could not load community reports.');
        return;
      }

      renderReports(reports || []);
    }

    async function loadDashboard() {
      const { data: sessionData } = await client.auth.getSession();
      const user = sessionData && sessionData.session && sessionData.session.user;
      if (!user) {
        renderBlank('Sign in to access your MolDraw dashboard and local drawing cards.');
        return;
      }
      currentUser = user;
      profileNav.hidden = false;
      renderProjects();

      const { data: profile, error: profileError } = await client
        .from('users')
        .select('id,name,email,designation,avatar_key,is_admin,role')
        .eq('id', user.id)
        .maybeSingle();
      currentProfile = profile || null;

      if (profileError || !profile || !(profile.is_admin || profile.role === 'admin')) {
        return;
      }

      requestsNav.hidden = false;
      reportsNav.hidden = false;
      usersNav.hidden = false;
    }

    drawingsNav.addEventListener('click', renderProjects);
    profileNav.addEventListener('click', loadProfile);
    requestsNav.addEventListener('click', loadFeatureRequests);
    reportsNav.addEventListener('click', loadReports);
    usersNav.addEventListener('click', loadUsers);
    requestModalBackdrop.addEventListener('click', (event) => {
      if (event.target === requestModalBackdrop) closeRequestModal();
    });
    confirmModalBackdrop.addEventListener('click', (event) => {
      if (event.target === confirmModalBackdrop) closeConfirmModal();
    });
    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && requestModalBackdrop.classList.contains('visible')) {
        closeRequestModal();
      }
      if (event.key === 'Escape' && confirmModalBackdrop.classList.contains('visible')) {
        closeConfirmModal();
      }
    });
    loadDashboard();
  </script>
</body>
</html>
