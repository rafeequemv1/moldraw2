<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body,
    html,
    #root {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    #ketcher-frame {
      touch-action: auto;
    }
  </style>
  <script>
    // Bridge script to communicate with parent
    window.addEventListener('load', function () {
      // Poll for ketcher instance and notify parent when ready
      const checkKetcher = setInterval(function () {
        const ketcherFrame = document.getElementById('ketcher-frame');
        if (ketcherFrame && ketcherFrame.contentWindow && ketcherFrame.contentWindow.ketcher) {
          clearInterval(checkKetcher);

          const ketcher = ketcherFrame.contentWindow.ketcher;
          console.log('Ketcher instance found:', ketcher);

          const applyDefaultCanvasZoom = () => {
            const editor = ketcher.editor || ketcherFrame.contentWindow.editor || null;
            const candidates = [
              () => {
                if (editor && typeof editor.setZoom === 'function') {
                  editor.setZoom(2);
                  return true;
                }
                return false;
              },
              () => {
                if (editor && typeof editor.zoom === 'function') {
                  editor.zoom(2);
                  return true;
                }
                return false;
              },
              () => {
                if (editor && typeof editor.zoomTo === 'function') {
                  editor.zoomTo(2);
                  return true;
                }
                return false;
              },
              () => {
                if (ketcher && typeof ketcher.setZoom === 'function') {
                  ketcher.setZoom(2);
                  return true;
                }
                return false;
              },
            ];

            for (const candidate of candidates) {
              try {
                if (candidate()) return;
              } catch (_) { /* try next zoom API */ }
            }

            try {
              const frameDoc = ketcherFrame.contentWindow.document;
              const zoomButtons = [
                '[data-testid*="zoom-in" i]',
                '[title*="Zoom in" i]',
                '[aria-label*="Zoom in" i]',
                'button[class*="zoom"][class*="in"]',
              ];
              const zoomInButton = zoomButtons
                .map((selector) => frameDoc.querySelector(selector))
                .find(Boolean);
              if (zoomInButton) {
                zoomInButton.click();
                zoomInButton.click();
              }
            } catch (_) { /* best effort only */ }
          };

          const tryAddTextLabel = async (editor, text, x, y) => {
            if (!editor || !text) return false;
            const clean = String(text).trim();
            if (!clean) return false;
            const candidates = [
              { fn: 'addText', args: [{ text: clean, x, y }] },
              { fn: 'addText', args: [clean, x, y] },
              { fn: 'addSimpleObject', args: [{ mode: 'TEXT', text: clean, x, y }] },
              { fn: 'addSgroup', args: [{ type: 'MUL', text: clean, x, y }] },
              { fn: 'insertText', args: [{ text: clean, x, y }] },
            ];
            for (const candidate of candidates) {
              if (typeof editor[candidate.fn] === 'function') {
                try {
                  await editor[candidate.fn](...candidate.args);
                  return true;
                } catch (_) { /* try next signature */ }
              }
            }
            return false;
          };

          // Notify parent that Ketcher is ready
          window.parent.postMessage({ type: 'ketcher-ready' }, '*');
          setTimeout(applyDefaultCanvasZoom, 250);

          const getMolfileFingerprint = (molfile) => {
            const text = String(molfile || '');
            if (!text.trim()) return '';
            return text
              .replace(/\r\n/g, '\n')
              .split('\n')
              .map((line) => line.trimEnd())
              .join('\n')
              .trim();
          };

          let lastChangeFingerprint = '';
          let changeTimer = null;
          let clipboardSvgCache = '';
          const emitEditorChange = async () => {
            try {
              const molfile = await ketcher.getMolfile();
              const fp = getMolfileFingerprint(molfile);
              if (fp === lastChangeFingerprint) return;
              lastChangeFingerprint = fp;
              const smiles = await ketcher.getSmiles();
              let ket = null;
              let svg = '';
              try {
                ket = await ketcher.getKet();
                const svgBlob = await ketcher.generateImage(ket, { outputFormat: 'svg' });
                svg = await svgBlob.text();
                clipboardSvgCache = svg;
              } catch (_) {
                refreshClipboardCache();
              }
              window.parent.postMessage({
                type: 'editor-change',
                molfile,
                smiles,
                ket,
                svg,
              }, '*');
            } catch (error) {
              console.warn('Bridge editor-change emit failed:', error);
            }
          };
          const scheduleEditorChange = () => {
            if (changeTimer) clearTimeout(changeTimer);
            changeTimer = setTimeout(() => {
              emitEditorChange();
            }, 180);
          };

          async function refreshClipboardCache() {
            try {
              const struct = await ketcher.getKet();
              const svgBlob = await ketcher.generateImage(struct, { outputFormat: 'svg' });
              clipboardSvgCache = await svgBlob.text();
            } catch (_) {
              clipboardSvgCache = '';
            }
          }

          const exportStructureForClipboard = async () => {
            const struct = await ketcher.getKet();
            const svgBlob = await ketcher.generateImage(struct, { outputFormat: 'svg' });
            const svgText = await svgBlob.text();
            let smiles = '';
            try {
              smiles = await ketcher.getSmiles();
            } catch (_) { /* optional fallback text */ }
            window.parent.postMessage({
              type: 'clipboard-structure-response',
              svg: svgText,
              smiles
            }, '*');
          };

          const getStructureSvgText = async () => {
            const struct = await ketcher.getKet();
            const svgBlob = await ketcher.generateImage(struct, { outputFormat: 'svg' });
            return svgBlob.text();
          };

          const EMPTY_MOLFILE = [
            '',
            '  MolDraw',
            '',
            '  0  0  0  0  0  0            999 V2000',
            'M  END',
            ''
          ].join('\n');

          const setKetcherStructure = async (payload) => {
            const candidates = [];
            if (payload && payload.ket) {
              candidates.push(typeof payload.ket === 'string' ? payload.ket : JSON.stringify(payload.ket));
            }
            if (payload && payload.molfile) {
              const molfile = String(payload.molfile || '');
              candidates.push(molfile);
              if (molfile.includes('M  END') && !molfile.includes('$$$$')) {
                candidates.push(`${molfile.trimEnd()}\n$$$$\n`);
              }
            }
            if (payload && payload.smiles) {
              candidates.push(String(payload.smiles || ''));
            }

            let lastError = null;
            for (const candidate of candidates) {
              try {
                await ketcher.setMolecule(candidate);
                return true;
              } catch (error) {
                lastError = error;
              }
            }
            throw lastError || new Error('No structure payload provided');
          };

          const clearKetcherEditor = async () => {
            if (typeof ketcher.clear === 'function') {
              await ketcher.clear();
              return;
            }
            await ketcher.setMolecule(EMPTY_MOLFILE);
          };

          const copyStructureSvgToClipboard = async () => {
            if (!navigator.clipboard || typeof ClipboardItem === 'undefined') {
              throw new Error('SVG clipboard is not available in this browser.');
            }

            const struct = await ketcher.getKet();
            const svgBlob = await ketcher.generateImage(struct, { outputFormat: 'svg' });
            const svgText = await svgBlob.text();
            const svgFileBlob = new Blob([svgText], { type: 'image/svg+xml' });
            const htmlBlob = new Blob([`<meta charset="utf-8"><div>${svgText}</div>`], { type: 'text/html' });

            try {
              await navigator.clipboard.write([
                new ClipboardItem({
                  'image/svg+xml': svgFileBlob,
                  'text/html': htmlBlob,
                })
              ]);
            } catch (_) {
              await navigator.clipboard.write([
                new ClipboardItem({
                  'text/html': htmlBlob,
                })
              ]);
            }

            window.parent.postMessage({ type: 'clipboard-structure-copied' }, '*');
            return true;
          };

          window.moldrawCopyStructureSvg = copyStructureSvgToClipboard;
          window.moldrawGetStructureSvg = getStructureSvgText;
          window.moldrawGetCurrentStructure = async () => {
            const molfile = await ketcher.getMolfile();
            const smiles = await ketcher.getSmiles();
            const ket = await ketcher.getKet();
            let svg = '';
            try {
              svg = await getStructureSvgText();
            } catch (_) { /* preview is optional */ }
            return { molfile, smiles, ket, svg };
          };

          // Best-effort edit listeners; fall back to user-triggered requests if unavailable.
          try {
            if (ketcher.editor && typeof ketcher.editor.subscribe === 'function') {
              ketcher.editor.subscribe('change', scheduleEditorChange);
            }
          } catch (_) { /* noop */ }
          try {
            const frameDoc = ketcherFrame.contentWindow.document;
            frameDoc.addEventListener('input', scheduleEditorChange, true);
            frameDoc.addEventListener('mouseup', scheduleEditorChange, true);
            frameDoc.addEventListener('pointerup', scheduleEditorChange, true);
            frameDoc.addEventListener('touchend', scheduleEditorChange, { capture: true, passive: true });
            frameDoc.addEventListener('keyup', scheduleEditorChange, true);
            frameDoc.addEventListener('keydown', function (event) {
              const key = String(event.key || '').toLowerCase();
              if (!(event.ctrlKey || event.metaKey) || key !== 'c') return;
              const target = event.target;
              const tagName = String(target?.tagName || '').toLowerCase();
              const isEditable = tagName === 'input' || tagName === 'textarea' || target?.isContentEditable;
              const selectedText = String(frameDoc.getSelection?.() || '');
              if (isEditable || selectedText) return;

              event.preventDefault();
              (async function () {
                if (typeof window.parent.moldrawCopySvgFromBridge === 'function') {
                  const svgText = await getStructureSvgText();
                  await window.parent.moldrawCopySvgFromBridge(svgText);
                  return;
                }
                await exportStructureForClipboard();
              })().catch(function (error) {
                console.error('Error copying structure SVG:', error);
                window.parent.postMessage({
                  type: 'clipboard-structure-error',
                  error: error.message
                }, '*');
              });
            }, true);
            frameDoc.addEventListener('copy', function (event) {
              const target = event.target;
              const tagName = String(target?.tagName || '').toLowerCase();
              const isEditable = tagName === 'input' || tagName === 'textarea' || target?.isContentEditable;
              const selectedText = String(frameDoc.getSelection?.() || '');
              if (isEditable || selectedText || !clipboardSvgCache) return;

              event.preventDefault();
              event.clipboardData.setData('text/html', `<meta charset="utf-8"><div>${clipboardSvgCache}</div>`);
              event.clipboardData.setData('image/svg+xml', clipboardSvgCache);
            }, true);
          } catch (_) { /* noop */ }

          refreshClipboardCache();

          // Listen for requests from parent
          window.addEventListener('message', async function (event) {
            console.log('Bridge received message:', event.data);

            if (event.data.type === 'get-molfile') {
              try {
                const molfile = await ketcher.getMolfile();
                window.parent.postMessage({
                  type: 'molfile-response',
                  molfile: molfile
                }, '*');
              } catch (error) {
                console.error('Error getting molfile:', error);
                window.parent.postMessage({
                  type: 'molfile-error',
                  error: error.message
                }, '*');
              }
            } else if (event.data.type === 'get-smiles') {
              try {
                const smiles = await ketcher.getSmiles();
                window.parent.postMessage({
                  type: 'smiles-response',
                  smiles: smiles
                }, '*');
              } catch (error) {
                console.error('Error getting SMILES:', error);
                window.parent.postMessage({
                  type: 'smiles-error',
                  error: error.message
                }, '*');
              }
            } else if (event.data.type === 'get-svg') {
              try {
                // Get structure using getKet()
                const struct = await ketcher.getKet();
                
                // Generate SVG using generateImage API
                const options = { outputFormat: 'svg' };
                const svgBlob = await ketcher.generateImage(struct, options);
                
                // Convert blob to text
                const svgText = await svgBlob.text();
                
                window.parent.postMessage({
                  type: 'svg-response',
                  svg: svgText
                }, '*');
              } catch (error) {
                console.error('Error getting SVG:', error);
                window.parent.postMessage({
                  type: 'svg-error',
                  error: error.message
                }, '*');
              }
            } else if (event.data.type === 'copy-structure') {
              try {
                await copyStructureSvgToClipboard();
              } catch (error) {
                console.error('Error copying structure for clipboard:', error);
                window.parent.postMessage({
                  type: 'clipboard-structure-error',
                  error: error.message
                }, '*');
              }
            } else if (event.data.type === 'get-png') {
              try {
                // Get structure using getKet()
                const struct = await ketcher.getKet();
                
                // Generate PNG using generateImage API
                const options = { outputFormat: 'png' };
                const pngBlob = await ketcher.generateImage(struct, options);
                
                // Convert blob to array buffer for transfer
                const arrayBuffer = await pngBlob.arrayBuffer();
                
                window.parent.postMessage({
                  type: 'png-response',
                  pngData: arrayBuffer
                }, '*');
              } catch (error) {
                console.error('Error getting PNG:', error);
                window.parent.postMessage({
                  type: 'png-error',
                  error: error.message
                }, '*');
              }
            } else if (event.data.type === 'get-png-jpeg') {
              try {
                // Get structure using getKet()
                const struct = await ketcher.getKet();

                // Generate PNG using generateImage API (will be converted to JPEG in parent)
                const options = { outputFormat: 'png' };
                const pngBlob = await ketcher.generateImage(struct, options);

                const arrayBuffer = await pngBlob.arrayBuffer();

                window.parent.postMessage({
                  type: 'png-response-jpeg',
                  pngData: arrayBuffer
                }, '*');
              } catch (error) {
                console.error('Error getting PNG for JPEG:', error);
                window.parent.postMessage({
                  type: 'png-error-jpeg',
                  error: error.message
                }, '*');
              }
            } else if (event.data.type === 'set-molecule') {
              try {
                console.log('Setting molecule with payload:', event.data);

                await setKetcherStructure(event.data);

                console.log('Molecule set successfully');
                let molfile = '';
                let smiles = String(event.data.smiles || '');
                try { molfile = await ketcher.getMolfile(); } catch (_) {}
                try { smiles = await ketcher.getSmiles(); } catch (_) {}
                window.parent.postMessage({
                  type: 'molecule-set',
                  success: true,
                  molfile: molfile,
                  smiles: smiles
                }, '*');
                scheduleEditorChange();
              } catch (error) {
                console.error('Error setting molecule:', error);
                window.parent.postMessage({
                  type: 'molecule-set',
                  success: false,
                  error: error.message
                }, '*');
              }
            } else if (event.data.type === 'append-molecule') {
              try {
                const structure = event.data.smiles;
                console.log('Appending molecule with structure:', structure);

                await ketcher.addFragment(structure);

                console.log('Fragment appended successfully');
                let molfile = '';
                let smiles = '';
                try { molfile = await ketcher.getMolfile(); } catch (_) {}
                try { smiles = await ketcher.getSmiles(); } catch (_) {}
                window.parent.postMessage({
                  type: 'molecule-set',
                  success: true,
                  molfile: molfile,
                  smiles: smiles
                }, '*');
                scheduleEditorChange();
              } catch (error) {
                console.error('Error appending fragment:', error);
                window.parent.postMessage({
                  type: 'molecule-set',
                  success: false,
                  error: error.message
                }, '*');
              }
            } else if (event.data.type === 'set-reaction-scene') {
              try {
                const reactionSmiles = String(event.data.reactionSmiles || '').trim();
                const reactionName = String(event.data.reactionName || '').trim();
                const reagents = Array.isArray(event.data.reagents) ? event.data.reagents.filter(Boolean) : [];
                const conditions = String(event.data.conditions || '').trim();
                const append = !!event.data.append;
                if (!reactionSmiles || !reactionSmiles.includes('>>')) {
                  throw new Error('Invalid reaction SMILES');
                }

                if (append && typeof ketcher.addFragment === 'function') {
                  try {
                    await ketcher.addFragment(reactionSmiles);
                  } catch {
                    // Fallback to setMolecule if addFragment does not accept reaction SMILES.
                    await ketcher.setMolecule(reactionSmiles);
                  }
                } else {
                  await ketcher.setMolecule(reactionSmiles);
                }

                const editor = ketcher.editor || ketcherFrame.contentWindow.editor || null;
                let annotationsApplied = false;
                const annotationLines = [];
                if (reactionName) annotationLines.push(reactionName);
                if (reagents.length) annotationLines.push(`Reagents: ${reagents.join(', ')}`);
                if (conditions) annotationLines.push(`Conditions: ${conditions}`);

                if (editor && annotationLines.length) {
                  // Best-effort labels placed below reaction.
                  let y = -3.8;
                  for (const line of annotationLines) {
                    const ok = await tryAddTextLabel(editor, line, 0.0, y);
                    annotationsApplied = annotationsApplied || ok;
                    y -= 1.2;
                  }
                }

                window.parent.postMessage({
                  type: 'reaction-set',
                  success: true,
                  annotationsApplied,
                }, '*');
                scheduleEditorChange();
              } catch (error) {
                console.error('Error setting reaction scene:', error);
                window.parent.postMessage({
                  type: 'reaction-set',
                  success: false,
                  error: error.message
                }, '*');
              }
            } else if (event.data.type === 'clear-editor') {
              try {
                await clearKetcherEditor();
                window.parent.postMessage({
                  type: 'molecule-set',
                  success: true
                }, '*');
                scheduleEditorChange();
              } catch (error) {
                console.error('Error clearing editor:', error);
                window.parent.postMessage({
                  type: 'molecule-set',
                  success: false,
                  error: error.message
                }, '*');
              }
            } else if (event.data.type === 'activate-lone-pair') {
              try {
                const frameDoc = ketcherFrame.contentWindow.document;
                const editor = ketcher && ketcher.editor ? ketcher.editor : null;
                let applied = false;

                // Try to apply lone pair directly to currently selected atom(s)
                const selection = editor && (
                  (typeof editor.selection === 'function' && editor.selection()) ||
                  (typeof editor.getSelection === 'function' && editor.getSelection()) ||
                  null
                );
                const atoms =
                  (selection && (selection.atoms || selection.selectedAtoms || selection.atomIds)) ||
                  [];

                const atomIds = Array.isArray(atoms) ? atoms : [];
                if (editor && atomIds.length) {
                  const addFns = [
                    'addLonePair',
                    'addLonePairs',
                    'addLonePairToAtom',
                    'addElectronPair',
                    'addElectronPairs',
                  ];
                  for (const fn of addFns) {
                    if (typeof editor[fn] === 'function') {
                      atomIds.forEach((id) => {
                        try { editor[fn](id); } catch (_) {}
                      });
                      applied = true;
                      break;
                    }
                  }
                }

                // Fallback: activate lone pair tool in UI for manual placement
                if (!applied) {
                  const lonePairBtn =
                    frameDoc.querySelector('[title*="Lone pair" i]') ||
                    frameDoc.querySelector('[title*="lone pair" i]') ||
                    frameDoc.querySelector('[aria-label*="Lone pair" i]') ||
                    frameDoc.querySelector('[aria-label*="lone pair" i]');

                  if (lonePairBtn && typeof lonePairBtn.click === 'function') {
                    lonePairBtn.click();
                    applied = true;
                  } else {
                    frameDoc.dispatchEvent(new KeyboardEvent('keydown', { key: 'l', bubbles: true }));
                    frameDoc.dispatchEvent(new KeyboardEvent('keydown', { key: 'L', bubbles: true }));
                  }
                }

                window.parent.postMessage({
                  type: 'lone-pair-activated',
                  success: true,
                  appliedDirectly: applied
                }, '*');
              } catch (error) {
                console.error('Error activating lone pair tool:', error);
                window.parent.postMessage({
                  type: 'lone-pair-activated',
                  success: false,
                  error: error.message
                }, '*');
              }
            }
          });
        }
      }, 100);

      // Timeout after 30 seconds
      setTimeout(function () {
        clearInterval(checkKetcher);
      }, 30000);
    });
  </script>
</head>

<body>
  <iframe id="ketcher-frame" src="/ketcher/"
    style="width: 100%; height: 100%; border: none; display: block;"></iframe>
</body>

</html>
