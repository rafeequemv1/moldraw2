<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Dilution calculator by MolDraw using C1V1=C2V2. Compute stock volume and solvent volume required for your target concentration.">
  <meta name="keywords" content="dilution calculator, C1V1 C2V2 calculator, chemistry dilution tool, MolDraw tools">
  <meta name="author" content="Scidart Academy">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta property="og:title" content="Dilution Calculator (C1V1=C2V2) | MolDraw Tools">
  <meta property="og:description" content="Calculate stock volume and solvent volume for lab dilutions quickly.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.moldraw.com/tools/free-chem-tools/dilution-calculator.html">
  <link rel="canonical" href="https://www.moldraw.com/tools/free-chem-tools/dilution-calculator.html">
  <title>Dilution Calculator (C1V1=C2V2) | MolDraw Tools</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Libre Franklin', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #111827; }
    .container { width: min(760px, 94vw); margin: 0 auto; padding: 24px 0 40px; }
    .top-nav { display: flex; gap: 10px; margin-bottom: 14px; }
    .top-link { display: inline-flex; align-items: center; border: 1px solid #d1d5db; border-radius: 8px; padding: 6px 10px; text-decoration: none; color: #334155; font-size: 12px; font-weight: 600; background: #fff; }
    .panel { background: #fff; border: 1px solid #e5e7eb; border-radius: 14px; padding: 18px; }
    h1 { font-size: 27px; color: #0f172a; margin-bottom: 8px; }
    p { color: #475569; font-size: 14px; margin-bottom: 12px; }
    label { display: block; font-size: 12px; color: #334155; font-weight: 700; margin-bottom: 10px; }
    input { width: 100%; margin-top: 4px; height: 34px; border: 1px solid #d7dce2; border-radius: 8px; padding: 0 10px; font-size: 13px; }
    .result { margin-top: 12px; border: 1px solid #e2e8f0; border-radius: 10px; background: #f8fafc; padding: 12px; color: #0f172a; font-size: 14px; min-height: 46px; }
  </style>
</head>
<body>
  <main class="container">
    <nav class="top-nav" aria-label="Tool navigation">
      <a class="top-link" href="/tools/index.html">Back to Tools Hub</a>
      <a class="top-link" href="/tools/free-chem-tools/index.html">Free Chemist Tools</a>
    </nav>
    <section class="panel">
      <h1>Dilution Calculator</h1>
      <p>Use <strong>C1V1 = C2V2</strong> to find stock volume and solvent volume for your target dilution.</p>
      <label>Stock concentration C1<input id="c1" type="number" step="0.0001" value="1"></label>
      <label>Target concentration C2<input id="c2" type="number" step="0.0001" value="0.1"></label>
      <label>Final volume V2 (mL)<input id="v2" type="number" step="0.1" value="100"></label>
      <div class="result" id="result">Enter valid values.</div>
    </section>
  </main>
  <script>
    function num(id) {
      const value = Number(document.getElementById(id).value);
      return Number.isFinite(value) ? value : NaN;
    }
    function calc() {
      const c1 = num('c1');
      const c2 = num('c2');
      const v2 = num('v2');
      const out = document.getElementById('result');
      if (c1 > 0 && c2 > 0 && v2 > 0 && c2 <= c1) {
        const v1 = (c2 * v2) / c1;
        const solvent = v2 - v1;
        out.textContent = `Stock volume V1: ${v1.toFixed(4)} mL | Solvent to add: ${solvent.toFixed(4)} mL`;
      } else if (c2 > c1) {
        out.textContent = 'Target concentration must be less than or equal to stock concentration.';
      } else {
        out.textContent = 'Please enter positive values in all fields.';
      }
    }
    ['c1', 'c2', 'v2'].forEach((id) => document.getElementById(id).addEventListener('input', calc));
    calc();
  </script>
</body>
</html>
