<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MOL to SMILES converter by MolDraw. Paste MOL/SDF content and convert to SMILES online with a free chemistry tool.">
  <meta name="keywords" content="mol to smiles converter, sdf to smiles, free chemistry tools, MolDraw">
  <meta name="author" content="Scidart Academy">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta property="og:title" content="MOL to SMILES Converter | Free Chemist Tools">
  <meta property="og:description" content="Convert MOL or SDF blocks to SMILES using this free chemistry converter tool.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://moldraw.scidart.com/tools/free-chem-tools/mol-to-smiles-converter.html">
  <link rel="canonical" href="https://moldraw.scidart.com/tools/free-chem-tools/mol-to-smiles-converter.html">
  <title>MOL to SMILES Converter | Free Chemist Tools</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Libre Franklin', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #111827; }
    .container { width: min(980px, 94vw); margin: 0 auto; padding: 24px 0 40px; }
    .top-nav { display: flex; gap: 10px; margin-bottom: 14px; }
    .top-link { display: inline-flex; align-items: center; border: 1px solid #d1d5db; border-radius: 8px; padding: 6px 10px; text-decoration: none; color: #334155; font-size: 12px; font-weight: 600; background: #fff; }
    .panel { background: #fff; border: 1px solid #e5e7eb; border-radius: 14px; padding: 18px; margin-bottom: 12px; }
    h1 { font-size: 28px; color: #0f172a; margin-bottom: 8px; }
    p { color: #475569; font-size: 14px; margin-bottom: 10px; line-height: 1.65; }
    textarea {
      width: 100%;
      min-height: 260px;
      border: 1px solid #cfd8e3;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      color: #0f172a;
      font-family: 'Courier New', monospace;
      resize: vertical;
    }
    .actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    button {
      border: 1px solid #2C7A7B;
      background: #2C7A7B;
      color: #fff;
      border-radius: 8px;
      height: 34px;
      padding: 0 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .ghost-btn { border-color: #d1d5db; background: #fff; color: #334155; }
    .output {
      margin-top: 12px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      border-radius: 10px;
      padding: 10px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      min-height: 52px;
      color: #0f172a;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <main class="container">
    <nav class="top-nav" aria-label="Tool navigation">
      <a class="top-link" href="/tools/free-chem-tools/index.html">Back to Free Chemist Tools</a>
      <a class="top-link" href="/">Open MolDraw App</a>
    </nav>

    <section class="panel">
      <h1>MOL to SMILES Converter</h1>
      <p>Paste a MOL or SDF block and convert it to SMILES. This tool attempts PubChem conversion first, then falls back to NCI Cactus when possible.</p>
      <textarea id="molInput" placeholder="Paste MOL/SDF content here..."></textarea>
      <div class="actions">
        <button id="convertBtn" type="button">Convert to SMILES</button>
        <button id="copyBtn" class="ghost-btn" type="button">Copy SMILES</button>
        <button id="clearBtn" class="ghost-btn" type="button">Clear</button>
      </div>
      <div class="output" id="resultBox">SMILES output appears here.</div>
    </section>
  </main>
  <script>
    const molInput = document.getElementById('molInput');
    const convertBtn = document.getElementById('convertBtn');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');
    const resultBox = document.getElementById('resultBox');

    async function convertViaPubChem(molText) {
      const form = new FormData();
      form.append('file', new Blob([molText], { type: 'chemical/x-mdl-molfile' }), 'structure.mol');
      const res = await fetch('https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/structure/property/CanonicalSMILES/TXT', {
        method: 'POST',
        body: form
      });
      if (!res.ok) throw new Error('PubChem conversion failed');
      return (await res.text()).trim();
    }

    async function convertViaCactus(molText) {
      const encoded = encodeURIComponent(molText);
      const res = await fetch(`https://cactus.nci.nih.gov/chemical/structure/${encoded}/smiles`);
      if (!res.ok) throw new Error('Cactus conversion failed');
      return (await res.text()).trim();
    }

    async function convertMolToSmiles() {
      const molText = (molInput.value || '').trim();
      if (!molText) {
        resultBox.textContent = 'Please paste MOL/SDF content first.';
        return;
      }
      resultBox.textContent = 'Converting...';
      try {
        let smiles = '';
        try {
          smiles = await convertViaPubChem(molText);
        } catch {
          smiles = await convertViaCactus(molText);
        }
        if (!smiles) {
          resultBox.textContent = 'No SMILES returned for this structure.';
          return;
        }
        resultBox.textContent = smiles;
      } catch {
        resultBox.textContent = 'Conversion failed. Ensure valid MOL/SDF input and try again.';
      }
    }

    convertBtn.addEventListener('click', convertMolToSmiles);
    copyBtn.addEventListener('click', async function () {
      const text = resultBox.textContent.trim();
      if (!text || text === 'SMILES output appears here.' || text.startsWith('Conversion') || text.startsWith('Please')) return;
      try {
        await navigator.clipboard.writeText(text);
        resultBox.textContent = text + '\n\nCopied to clipboard.';
      } catch {
        resultBox.textContent = text + '\n\nClipboard copy failed.';
      }
    });
    clearBtn.addEventListener('click', function () {
      molInput.value = '';
      resultBox.textContent = 'SMILES output appears here.';
    });
  </script>
</body>
</html>
