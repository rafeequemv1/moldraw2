<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free molality calculator for chemists. Compute molality from solute mass, molecular weight, and solvent mass.">
  <meta name="keywords" content="molality calculator, free chemistry calculator, concentration calculator, MolDraw tools">
  <meta name="author" content="Scidart Academy">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta property="og:title" content="Molality Calculator | Free Chemist Tools">
  <meta property="og:description" content="Calculate molality quickly with a standalone free chemistry calculator.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://moldraw.scidart.com/tools/free-chem-tools/molality-calculator.html">
  <link rel="canonical" href="https://moldraw.scidart.com/tools/free-chem-tools/molality-calculator.html">
  <title>Molality Calculator | Free Chemist Tools</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Libre Franklin', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #111827; }
    .container { width: min(760px, 94vw); margin: 0 auto; padding: 24px 0 40px; }
    .top-nav { display: flex; gap: 10px; margin-bottom: 14px; }
    .top-link { display: inline-flex; align-items: center; border: 1px solid #d1d5db; border-radius: 8px; padding: 6px 10px; text-decoration: none; color: #334155; font-size: 12px; font-weight: 600; background: #fff; }
    .panel { background: #fff; border: 1px solid #e5e7eb; border-radius: 14px; padding: 18px; }
    h1 { font-size: 27px; color: #0f172a; margin-bottom: 8px; }
    p { color: #475569; font-size: 14px; margin-bottom: 12px; }
    label { display: block; font-size: 12px; color: #334155; font-weight: 700; margin-bottom: 10px; }
    input { width: 100%; margin-top: 4px; height: 34px; border: 1px solid #d7dce2; border-radius: 8px; padding: 0 10px; font-size: 13px; }
    .result { margin-top: 12px; border: 1px solid #e2e8f0; border-radius: 10px; background: #f8fafc; padding: 12px; color: #0f172a; font-size: 14px; min-height: 46px; }
  </style>
</head>
<body>
  <main class="container">
    <nav class="top-nav" aria-label="Tool navigation">
      <a class="top-link" href="/tools/free-chem-tools/index.html">Back to Free Chemist Tools</a>
      <a class="top-link" href="/">Open MolDraw App</a>
    </nav>
    <section class="panel">
      <h1>Molality Calculator</h1>
      <p>Compute solution molality from solute mass, molecular weight, and solvent mass.</p>
      <label>Solute mass (g)<input id="mass" type="number" step="0.001" value="1.50"></label>
      <label>Molecular weight (g/mol)<input id="mw" type="number" step="0.001" value="58.44"></label>
      <label>Solvent mass (g)<input id="solvent" type="number" step="0.001" value="100"></label>
      <div class="result" id="result">Enter valid values.</div>
    </section>
  </main>
  <script>
    function getNum(id) {
      const value = Number(document.getElementById(id).value);
      return Number.isFinite(value) ? value : NaN;
    }
    function calc() {
      const mass = getNum('mass');
      const mw = getNum('mw');
      const solvent = getNum('solvent');
      const out = document.getElementById('result');
      if (mass > 0 && mw > 0 && solvent > 0) {
        const moles = mass / mw;
        const molality = moles / (solvent / 1000);
        out.textContent = `Moles: ${moles.toFixed(6)} mol | Molality: ${molality.toFixed(6)} mol/kg`;
      } else {
        out.textContent = 'Please enter positive values in all fields.';
      }
    }
    ['mass', 'mw', 'solvent'].forEach((id) => document.getElementById(id).addEventListener('input', calc));
    calc();
  </script>
</body>
</html>
