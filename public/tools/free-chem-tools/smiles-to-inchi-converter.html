<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SMILES to InChI converter by MolDraw. Convert SMILES strings to standard InChI identifiers for database and publication workflows.">
  <meta name="keywords" content="smiles to inchi converter, standard inchi generator, chemistry identifier tool, MolDraw">
  <meta name="author" content="Scidart Academy">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta property="og:title" content="SMILES to InChI Converter | MolDraw Tools">
  <meta property="og:description" content="Generate standard InChI from SMILES in a dedicated free chemistry converter.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://moldraw.scidart.com/tools/free-chem-tools/smiles-to-inchi-converter.html">
  <link rel="canonical" href="https://moldraw.scidart.com/tools/free-chem-tools/smiles-to-inchi-converter.html">
  <title>SMILES to InChI Converter | MolDraw Tools</title>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "SMILES to InChI Converter",
    "applicationCategory": "ScientificApplication",
    "operatingSystem": "Web",
    "url": "https://moldraw.scidart.com/tools/free-chem-tools/smiles-to-inchi-converter.html",
    "description": "Convert SMILES to standard InChI identifiers."
  }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Libre Franklin', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #111827; }
    .container { width: min(920px, 94vw); margin: 0 auto; padding: 24px 0 40px; }
    .top-nav { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
    .top-link { display: inline-flex; align-items: center; border: 1px solid #d1d5db; border-radius: 8px; padding: 6px 10px; text-decoration: none; color: #334155; background: #fff; font-size: 12px; font-weight: 600; }
    .panel { background: #fff; border: 1px solid #e5e7eb; border-radius: 14px; padding: 18px; }
    h1 { font-size: 28px; margin-bottom: 8px; color: #0f172a; }
    p { font-size: 14px; color: #475569; margin-bottom: 10px; }
    textarea { width: 100%; min-height: 90px; border: 1px solid #cfd8e3; border-radius: 10px; padding: 10px 12px; font-family: 'Courier New', monospace; font-size: 13px; }
    .output { margin-top: 12px; min-height: 110px; border: 1px solid #e2e8f0; border-radius: 10px; background: #f8fafc; padding: 10px; white-space: pre-wrap; font-family: 'Courier New', monospace; font-size: 12px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    button { height: 34px; border: 1px solid #2c7a7b; border-radius: 8px; background: #2c7a7b; color: #fff; font-size: 12px; font-weight: 700; padding: 0 12px; cursor: pointer; }
    .ghost-btn { background: #fff; border-color: #d1d5db; color: #334155; }
  </style>
</head>
<body>
  <main class="container">
    <nav class="top-nav" aria-label="Tool navigation">
      <a class="top-link" href="/tools/free-chem-tools/index.html">Back to Free Chem Tools</a>
      <a class="top-link" href="/tools/index.html">All Tools</a>
    </nav>
    <section class="panel">
      <h1>SMILES to InChI Converter</h1>
      <p>Convert SMILES to standard InChI for search, indexing, and publication workflows.</p>
      <textarea id="inputSmiles" placeholder="Example: CC(=O)OC1=CC=CC=C1C(=O)O">CC(=O)OC1=CC=CC=C1C(=O)O</textarea>
      <div class="actions">
        <button id="convertBtn" type="button">Convert</button>
        <button id="copyBtn" class="ghost-btn" type="button">Copy InChI</button>
        <button id="clearBtn" class="ghost-btn" type="button">Clear</button>
      </div>
      <div class="output" id="outputBox">InChI output appears here.</div>
    </section>
  </main>
  <script>
    const input = document.getElementById('inputSmiles');
    const output = document.getElementById('outputBox');
    let latest = '';
    document.getElementById('convertBtn').addEventListener('click', async () => {
      const smiles = (input.value || '').trim();
      if (!smiles) return output.textContent = 'Please enter a SMILES string.';
      output.textContent = 'Converting...';
      latest = '';
      try {
        const url = `https://cactus.nci.nih.gov/chemical/structure/${encodeURIComponent(smiles)}/stdinchi`;
        const res = await fetch(url);
        if (!res.ok) throw new Error('Conversion failed');
        const text = (await res.text()).trim();
        if (!text) throw new Error('Empty response');
        latest = text;
        output.textContent = text;
      } catch {
        output.textContent = 'Conversion failed. Try a valid SMILES string.';
      }
    });
    document.getElementById('copyBtn').addEventListener('click', async () => {
      if (!latest) return output.textContent = 'Convert first, then copy.';
      try { await navigator.clipboard.writeText(latest); output.textContent = `${latest}\n\nCopied.`; } catch {}
    });
    document.getElementById('clearBtn').addEventListener('click', () => {
      input.value = ''; latest = ''; output.textContent = 'InChI output appears here.';
    });
  </script>
</body>
</html>
