<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SMILES to PDB converter by MolDraw. Convert a SMILES string to a downloadable 3D PDB file with a free chemistry tool.">
  <meta name="keywords" content="smiles to pdb converter, smiles to pdb, free chemistry tools, molecular modeling input, MolDraw">
  <meta name="author" content="Scidart Academy">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta property="og:title" content="SMILES to PDB Converter | Free Chemist Tools">
  <meta property="og:description" content="Convert SMILES strings into 3D PDB files for modeling and visualization workflows.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://moldraw.scidart.com/tools/free-chem-tools/smiles-to-pdb-converter.html">
  <link rel="canonical" href="https://moldraw.scidart.com/tools/free-chem-tools/smiles-to-pdb-converter.html">
  <title>SMILES to PDB Converter | Free Chemist Tools</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Libre Franklin', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #111827; }
    .container { width: min(920px, 94vw); margin: 0 auto; padding: 24px 0 40px; }
    .top-nav { display: flex; gap: 10px; margin-bottom: 14px; }
    .top-link { display: inline-flex; align-items: center; border: 1px solid #d1d5db; border-radius: 8px; padding: 6px 10px; text-decoration: none; color: #334155; font-size: 12px; font-weight: 600; background: #fff; }
    .panel { background: #fff; border: 1px solid #e5e7eb; border-radius: 14px; padding: 18px; margin-bottom: 12px; }
    h1 { font-size: 28px; color: #0f172a; margin-bottom: 8px; }
    p { color: #475569; font-size: 14px; margin-bottom: 10px; line-height: 1.65; }
    textarea {
      width: 100%;
      min-height: 90px;
      border: 1px solid #cfd8e3;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      color: #0f172a;
      font-family: 'Courier New', monospace;
      resize: vertical;
    }
    .actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    button {
      border: 1px solid #2C7A7B;
      background: #2C7A7B;
      color: #fff;
      border-radius: 8px;
      height: 34px;
      padding: 0 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .ghost-btn { border-color: #d1d5db; background: #fff; color: #334155; }
    .output {
      margin-top: 12px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      border-radius: 10px;
      padding: 10px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      min-height: 180px;
      color: #0f172a;
      white-space: pre;
      overflow: auto;
    }
  </style>
</head>
<body>
  <main class="container">
    <nav class="top-nav" aria-label="Tool navigation">
      <a class="top-link" href="/tools/free-chem-tools/index.html">Back to Free Chemist Tools</a>
      <a class="top-link" href="/">Open MolDraw App</a>
    </nav>

    <section class="panel">
      <h1>SMILES to PDB Converter</h1>
      <p>Convert a SMILES string to a 3D PDB file using a public chemistry conversion endpoint. You can preview and download the generated PDB text.</p>
      <textarea id="smilesInput" placeholder="Example: CC(=O)OC1=CC=CC=C1C(=O)O">CC(=O)OC1=CC=CC=C1C(=O)O</textarea>
      <div class="actions">
        <button id="convertBtn" type="button">Convert to PDB</button>
        <button id="downloadBtn" class="ghost-btn" type="button">Download PDB</button>
        <button id="clearBtn" class="ghost-btn" type="button">Clear</button>
      </div>
      <div class="output" id="resultBox">PDB output appears here.</div>
    </section>
  </main>
  <script>
    const smilesInput = document.getElementById('smilesInput');
    const convertBtn = document.getElementById('convertBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const clearBtn = document.getElementById('clearBtn');
    const resultBox = document.getElementById('resultBox');
    let latestPdb = '';

    async function convertSmilesToPdb() {
      const smiles = (smilesInput.value || '').trim();
      if (!smiles) {
        resultBox.textContent = 'Please enter a SMILES string first.';
        return;
      }
      resultBox.textContent = 'Converting...';
      latestPdb = '';
      try {
        const encoded = encodeURIComponent(smiles);
        const url = `https://cactus.nci.nih.gov/chemical/structure/${encoded}/file?format=pdb&get3d=true`;
        const res = await fetch(url);
        if (!res.ok) throw new Error('Conversion failed');
        const pdbText = await res.text();
        if (!pdbText || !pdbText.trim()) throw new Error('Empty PDB response');
        latestPdb = pdbText;
        resultBox.textContent = pdbText;
      } catch {
        resultBox.textContent = 'Could not convert this SMILES to PDB. Try another valid SMILES string.';
      }
    }

    function downloadPdb() {
      if (!latestPdb) {
        resultBox.textContent = 'Convert to PDB first, then download.';
        return;
      }
      const blob = new Blob([latestPdb], { type: 'chemical/x-pdb' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'molecule.pdb';
      link.click();
      URL.revokeObjectURL(url);
    }

    convertBtn.addEventListener('click', convertSmilesToPdb);
    downloadBtn.addEventListener('click', downloadPdb);
    clearBtn.addEventListener('click', function () {
      smilesInput.value = '';
      latestPdb = '';
      resultBox.textContent = 'PDB output appears here.';
    });
  </script>
</body>
</html>
